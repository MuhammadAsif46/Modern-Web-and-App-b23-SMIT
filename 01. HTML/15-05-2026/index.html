<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Chapter no : 07 = Forms</h1>
    <textarea name="comments" placeholder="Enter your comments"></textarea>
    <input type="text" name="username" placeholder="Enter your username" />
    <hr />
    <p>Select your gender</p>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="other" checked> Others

    <hr />
    <p>Select any two Fav subjects:</p>
    <input type="checkbox" name="subject" value="english"> English
    <input type="checkbox" name="subject" value="urdu"> Urdu
    <input type="checkbox" name="subject" value="math" checked> Math
    <input type="checkbox" name="subject" value="computer" checked> Computer

    <hr />

    <select name="countries" multiple>
        <option value="china" selected>China</option>
        <option value="bang">Bangladesh</option>
        <option value="pakistan" selected>Pakistan</option>
        <option value="sri">Srilanka</option>
        <option value="can">Canada</option>
    </select>

    <hr />

    <p>Select your profile</p>
    <input type="file" name="user-profile">

    <hr />

    <input type="button" name="submit" value="Submit Form">
    <!-- <input type="button" name="clear" value="Clear Form"> -->
    <button>Contact</button>
    <button>Click me</button>  
</body>

</html>
